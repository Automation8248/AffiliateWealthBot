name: Amazon Affiliate Auto Poster with Ollama

on:
  schedule:
    # Din mein 2 baar chalega (UTC 02:00 aur 14:00)
    - cron: '0 2,14 * * *'
  workflow_dispatch: # Manual run ke liye

permissions:
  contents: write 

jobs:
  scrape-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 ollama

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama Server & Pull Model
        run: |
          # Ollama ko background mein start karna
          ollama serve &
          # Server ko start hone ke liye 5 second ka wait
          sleep 5
          # qwen3.5 model ko download karna (Isme 1-2 minute lag sakte hain)
          ollama pull qwen3.5

      - name: Run Scraper Script
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Commit Updated History File
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          if [[ -n $(git status --porcelain history.json) ]]; then
            git add history.json
            git commit -m "Auto-update history.json with latest timestamp"
            git push
          else
            echo "Koi naya link post nahi hua, history file same hai."
          fi
