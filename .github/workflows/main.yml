name: Amazon Affiliate Automation

on:
  schedule:
    # Daily run at 14:00 UTC (9:00 AM EST)
    - cron: '0 14 * * *'
  workflow_dispatch: # GitHub Actions tab se manually run karne ke liye

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Install Playwright Browsers
        # Sirf chromium install kar rahe hain taaki action fast run ho
        run: playwright install chromium

      - name: Run Main Script
        env:
          # Aapke GitHub repository secrets
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python main.py

      - name: Commit Updated links.txt
        # Yeh step process ho chuke link ko file se delete karke save karega
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add links.txt
          git commit -m "Auto-removed processed Amazon link" || echo "No changes to commit"
          git push
